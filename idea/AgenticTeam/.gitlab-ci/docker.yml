###############################################################################
# .gitlab-ci/docker.yml — Reusable Docker build & publish templates
###############################################################################

# ---------------------------------------------------------------------------
# Build: creates image tagged with commit SHA
# ---------------------------------------------------------------------------
.docker-build:
  stage: build
  image: docker:24-dind
  services:
    - docker:24-dind
  variables:
    BUILD_CONTEXT: ""
    IMAGE_NAME: ""
  before_script:
    - docker login -u "${CI_REGISTRY_USER}" -p "${CI_REGISTRY_PASSWORD}" "${CI_REGISTRY}"
  script:
    - |
      docker build \
        --file "${BUILD_CONTEXT}/Dockerfile" \
        --build-arg BUILDKIT_INLINE_CACHE=1 \
        --cache-from "${IMAGE_NAME}:latest" \
        --tag "${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}" \
        "${BUILD_CONTEXT}"
    - docker push "${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}"

# ---------------------------------------------------------------------------
# Publish: tags image with latest + semver (if git tag present)
# ---------------------------------------------------------------------------
.docker-publish:
  stage: publish
  image: docker:24-dind
  services:
    - docker:24-dind
  variables:
    IMAGE_NAME: ""
  before_script:
    - docker login -u "${CI_REGISTRY_USER}" -p "${CI_REGISTRY_PASSWORD}" "${CI_REGISTRY}"
  script:
    - docker pull "${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}"
    # Tag as latest
    - docker tag "${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}" "${IMAGE_NAME}:latest"
    - docker push "${IMAGE_NAME}:latest"
    # Tag with semver if this is a git tag (e.g. v1.2.3)
    - |
      if [ -n "${CI_COMMIT_TAG}" ]; then
        SEMVER="${CI_COMMIT_TAG#v}"
        docker tag "${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}" "${IMAGE_NAME}:${SEMVER}"
        docker push "${IMAGE_NAME}:${SEMVER}"
        echo "Published semver tag: ${SEMVER}"
      fi

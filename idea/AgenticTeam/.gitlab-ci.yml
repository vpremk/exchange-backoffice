###############################################################################
# Compliance Sentinel — GitLab CI/CD Pipeline
# GitLab: self-hosted  |  Registry: self-hosted GitLab Container Registry
# Environments: dev → staging → production
###############################################################################

include:
  - local: ".gitlab-ci/docker.yml"
  - local: ".gitlab-ci/deploy.yml"
  - local: ".gitlab-ci/security.yml"

variables:
  REGISTRY: "${CI_REGISTRY}"
  BACKEND_IMAGE: "${CI_REGISTRY}/${CI_PROJECT_PATH}/backend"
  FRONTEND_IMAGE: "${CI_REGISTRY}/${CI_PROJECT_PATH}/frontend"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.cache/npm"
  DOCKER_TLS_CERTDIR: "/certs"
  DOCKER_HOST: "tcp://docker:2376"

stages:
  - lint
  - test
  - security
  - build
  - publish
  - deploy-dev
  - smoke-test-dev
  - dast
  - deploy-stg
  - smoke-test-stg
  - deploy-prod
  - smoke-test-prod
  - compliance-report

# ---------------------------------------------------------------------------
# Global defaults
# ---------------------------------------------------------------------------
default:
  tags:
    - shared
    - docker

# ---------------------------------------------------------------------------
# Change-detection rules (reusable anchors)
# ---------------------------------------------------------------------------
.backend-changes: &backend-changes
  - changes:
      - backend/**/*
      - requirements*.txt
      - pyproject.toml
      - .gitlab-ci.yml
      - .gitlab-ci/docker.yml
      - .gitlab-ci/security.yml

.frontend-changes: &frontend-changes
  - changes:
      - frontend/**/*
      - package*.json
      - tsconfig*.json
      - .gitlab-ci.yml
      - .gitlab-ci/docker.yml

.infra-changes: &infra-changes
  - changes:
      - deploy.sh
      - docker-compose*.yml
      - helm/**/*
      - .gitlab-ci/deploy.yml

.any-code-changes: &any-code-changes
  - changes:
      - backend/**/*
      - frontend/**/*
      - .gitlab-ci.yml

# ===========================================================================
# STAGE 1 — LINT
# ===========================================================================
lint:backend:ruff:
  stage: lint
  image: python:3.11-slim
  cache:
    key: pip-${CI_COMMIT_REF_SLUG}
    paths:
      - .cache/pip
  before_script:
    - pip install --quiet ruff
  script:
    - ruff check backend/ --output-format=gitlab
  rules:
    - *backend-changes

lint:backend:mypy:
  stage: lint
  image: python:3.11-slim
  cache:
    key: pip-${CI_COMMIT_REF_SLUG}
    paths:
      - .cache/pip
  before_script:
    - pip install --quiet mypy
    - pip install --quiet -r backend/requirements.txt || true
  script:
    - mypy backend/ --ignore-missing-imports
  rules:
    - *backend-changes

lint:frontend:eslint:
  stage: lint
  image: node:20-alpine
  cache:
    key: npm-${CI_COMMIT_REF_SLUG}
    paths:
      - .cache/npm
      - frontend/node_modules/
  before_script:
    - cd frontend && npm ci --prefer-offline
  script:
    - npx eslint src/ --format gitlab
  rules:
    - *frontend-changes

lint:frontend:tsc:
  stage: lint
  image: node:20-alpine
  cache:
    key: npm-${CI_COMMIT_REF_SLUG}
    paths:
      - .cache/npm
      - frontend/node_modules/
  before_script:
    - cd frontend && npm ci --prefer-offline
  script:
    - npx tsc --noEmit
  rules:
    - *frontend-changes

# ===========================================================================
# STAGE 2 — TEST
# ===========================================================================
test:backend:
  stage: test
  image: python:3.11-slim
  cache:
    key: pip-${CI_COMMIT_REF_SLUG}
    paths:
      - .cache/pip
  before_script:
    - pip install --quiet -r backend/requirements.txt
    - pip install --quiet pytest pytest-cov
  script:
    - pytest backend/tests/
        --cov=backend
        --cov-report=term-missing
        --cov-report=xml:coverage-backend.xml
        --junitxml=report-backend.xml
  artifacts:
    when: always
    reports:
      junit: report-backend.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage-backend.xml
    expire_in: 30 days
  coverage: '/TOTAL.*\s(\d+)%/'
  rules:
    - *backend-changes

test:frontend:
  stage: test
  image: node:20-alpine
  cache:
    key: npm-${CI_COMMIT_REF_SLUG}
    paths:
      - .cache/npm
      - frontend/node_modules/
  before_script:
    - cd frontend && npm ci --prefer-offline
  script:
    - cd frontend && npx vitest run --coverage --reporter=junit --outputFile=../report-frontend.xml
  artifacts:
    when: always
    reports:
      junit: report-frontend.xml
    expire_in: 30 days
  rules:
    - *frontend-changes

# ===========================================================================
# STAGE 3 — SECURITY  (extended from .gitlab-ci/security.yml)
# ===========================================================================
security:bandit:
  extends: .security-bandit
  rules:
    - *backend-changes

security:npm-audit:
  extends: .security-npm-audit
  rules:
    - *frontend-changes

security:trivy:backend:
  extends: .security-trivy
  variables:
    SCAN_IMAGE: "${BACKEND_IMAGE}:${CI_COMMIT_SHORT_SHA}"
  needs: ["build:backend"]
  rules:
    - *backend-changes

security:trivy:frontend:
  extends: .security-trivy
  variables:
    SCAN_IMAGE: "${FRONTEND_IMAGE}:${CI_COMMIT_SHORT_SHA}"
  needs: ["build:frontend"]
  rules:
    - *frontend-changes

# ===========================================================================
# STAGE 4 — BUILD  (extended from .gitlab-ci/docker.yml)
# ===========================================================================
build:backend:
  extends: .docker-build
  variables:
    BUILD_CONTEXT: backend
    IMAGE_NAME: "${BACKEND_IMAGE}"
  rules:
    - *backend-changes

build:frontend:
  extends: .docker-build
  variables:
    BUILD_CONTEXT: frontend
    IMAGE_NAME: "${FRONTEND_IMAGE}"
  rules:
    - *frontend-changes

# ===========================================================================
# STAGE 5 — PUBLISH
# ===========================================================================
publish:backend:
  extends: .docker-publish
  variables:
    IMAGE_NAME: "${BACKEND_IMAGE}"
  needs: ["build:backend", "security:trivy:backend"]
  rules:
    - *backend-changes

publish:frontend:
  extends: .docker-publish
  variables:
    IMAGE_NAME: "${FRONTEND_IMAGE}"
  needs: ["build:frontend", "security:trivy:frontend"]
  rules:
    - *frontend-changes

# ===========================================================================
# STAGE 6 — DEPLOY DEV  (auto on develop branch)
# ===========================================================================
deploy:dev:
  extends: .deploy
  stage: deploy-dev
  variables:
    DEPLOY_ENV: dev
    DEPLOY_METHOD: compose
  environment:
    name: dev
    url: https://sentinel-dev.${CI_SERVER_HOST}
  needs: ["publish:backend", "publish:frontend"]
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
      when: on_success

smoke-test:dev:
  extends: .smoke-test
  stage: smoke-test-dev
  variables:
    TARGET_URL: "https://sentinel-dev.${CI_SERVER_HOST}"
  needs: ["deploy:dev"]
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
      when: on_success

# ===========================================================================
# DAST — OWASP ZAP against dev environment
# ===========================================================================
dast:zap:
  stage: dast
  image: ghcr.io/zaproxy/zaproxy:stable
  variables:
    TARGET_URL: "https://sentinel-dev.${CI_SERVER_HOST}"
  script:
    - mkdir -p /zap/wrk
    - zap-baseline.py
        -t "${TARGET_URL}"
        -g gen.conf
        -r zap-report.html
        -J zap-report.json
        -I
  after_script:
    - cp /zap/wrk/zap-report.* . 2>/dev/null || true
  artifacts:
    when: always
    paths:
      - zap-report.html
      - zap-report.json
    expire_in: 30 days
  needs: ["smoke-test:dev"]
  allow_failure: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
      when: on_success

# ===========================================================================
# STAGE 7 — DEPLOY STAGING  (auto on main branch)
# ===========================================================================
deploy:staging:
  extends: .deploy
  stage: deploy-stg
  variables:
    DEPLOY_ENV: staging
    DEPLOY_METHOD: helm
  environment:
    name: staging
    url: https://sentinel-staging.${CI_SERVER_HOST}
  needs: ["publish:backend", "publish:frontend"]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_success

smoke-test:staging:
  extends: .smoke-test
  stage: smoke-test-stg
  variables:
    TARGET_URL: "https://sentinel-staging.${CI_SERVER_HOST}"
  needs: ["deploy:staging"]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_success

# ===========================================================================
# STAGE 8 — DEPLOY PRODUCTION  (manual gate, requires approval)
# ===========================================================================
deploy:production:
  extends: .deploy
  stage: deploy-prod
  variables:
    DEPLOY_ENV: production
    DEPLOY_METHOD: helm
  environment:
    name: production
    url: https://sentinel.${CI_SERVER_HOST}
    deployment_tier: production
  needs: ["smoke-test:staging"]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
      allow_failure: false

smoke-test:production:
  extends: .smoke-test
  stage: smoke-test-prod
  variables:
    TARGET_URL: "https://sentinel.${CI_SERVER_HOST}"
  needs: ["deploy:production"]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_success

# ===========================================================================
# STAGE 10 — COMPLIANCE REPORT
# ===========================================================================
compliance-report:
  stage: compliance-report
  image: python:3.11-slim
  script:
    - mkdir -p compliance-reports
    - |
      cat > compliance-reports/summary.json <<REPORT_EOF
      {
        "pipeline_id": "${CI_PIPELINE_ID}",
        "commit": "${CI_COMMIT_SHA}",
        "ref": "${CI_COMMIT_REF_NAME}",
        "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
        "stages_completed": {
          "lint": true,
          "test": true,
          "security_scan": true,
          "container_scan": true,
          "dast": true,
          "deploy": true,
          "smoke_test": true
        }
      }
      REPORT_EOF
    - echo "--- Compliance Report ---"
    - cat compliance-reports/summary.json
    # Collect scan artifacts from prior stages
    - cp zap-report.json compliance-reports/ 2>/dev/null || echo "No ZAP report"
    - cp trivy-report-*.json compliance-reports/ 2>/dev/null || echo "No Trivy reports"
    - cp bandit-report.json compliance-reports/ 2>/dev/null || echo "No Bandit report"
  artifacts:
    paths:
      - compliance-reports/
    expire_in: 1 year
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"'
      when: always
